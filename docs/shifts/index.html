<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Shifts | DJF26 Driver Portal</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #1f1f1f;
            --accent: #d94d1a;
            --muted: #666666;
            --border: #e0e0e0;
            --card: #f8f9fa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.6;
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }
        header {
            border-bottom: 2px solid var(--accent);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }
        header h1 {
            color: var(--accent);
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        header p {
            color: var(--muted);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        .breadcrumb {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }
        .breadcrumb a {
            color: var(--accent);
            text-decoration: none;
        }
        .breadcrumb a:hover { text-decoration: underline; }
        .content {
            background: var(--card);
            border-radius: 8px;
            padding: 2rem;
            border: 1px solid var(--border);
        }
        .content h1 {
            color: var(--accent);
            font-size: 1.8rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }
        .content h2 {
            color: var(--fg);
            font-size: 1.3rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        .content h3 {
            color: var(--muted);
            font-size: 1.1rem;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
        }
        .content p {
            margin-bottom: 1rem;
            color: var(--fg);
        }
        .content ul, .content ol {
            margin-left: 1.5rem;
            margin-bottom: 1rem;
        }
        .content li {
            margin-bottom: 0.5rem;
        }
        .content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            font-size: 0.9rem;
        }
        .content th {
            background: var(--accent);
            color: var(--bg);
            padding: 0.75rem;
            text-align: left;
            font-weight: 600;
        }
        .content td {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        .content tr:hover {
            background: rgba(255,107,53,0.05);
        }
        .content code {
            background: var(--bg);
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 0.9em;
        }
        .content pre {
            background: var(--bg);
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            border: 1px solid var(--border);
            margin-bottom: 1rem;
        }
        .content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 1rem;
            margin-left: 0;
            color: var(--muted);
            font-style: italic;
        }
        .content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2rem 0;
        }
        footer {
            margin-top: 3rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.85rem;
            text-align: center;
        }
        @media (max-width: 600px) {
            body { padding: 1rem; }
            .content { padding: 1rem; }
            .content table {
                font-size: 0.8rem;
            }
            .content th, .content td {
                padding: 0.5rem;
            }
        }
        @media print {
            body { background: #fff; color: #000; padding: 0; }
            header, .breadcrumb, footer { display: none; }
            .content { border: none; padding: 0; box-shadow: none; background: #fff; }
            a { text-decoration: none; color: #000; }
        }
        /* Message box styling for pickup text */
        .message-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 1rem;
            position: relative;
        }
        .message-text {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--fg);
            margin-bottom: 0.75rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .copy-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .copy-btn:hover {
            opacity: 0.9;
        }
        .copy-btn:active {
            transform: scale(0.98);
        }
        .copy-btn.copied {
            background: #28a745;
        }
    </style>
</head>
<body>
    <header>
        <h1>🎷 Denver Jazz Fest 2026</h1>
        <p>Driver Portal • Grand Transportation Coordination</p>
    </header>
    <div class="breadcrumb"><a href="/DJF26/index.html">Home</a> / Shifts</div>
    <div class="content">
        <h1>All Shifts by Date</h1><h2><a href="/DJF26/shifts/4-08/index.html">4/08</a></h2><h2><a href="/DJF26/shifts/4-09/index.html">4/09</a></h2><h2><a href="/DJF26/shifts/4-10/index.html">4/10</a></h2><h2><a href="/DJF26/shifts/4-11/index.html">4/11</a></h2><h2><a href="/DJF26/shifts/4-12/index.html">4/12</a></h2>
    </div>
    <footer>
        <p>Generated 2026-04-11 22:58 • Internal Use Only</p>
    </footer>
    <script>
        function copyMessage(btn) {
            const messageBox = btn.parentElement;
            const messageText = messageBox.querySelector('.message-text').innerText;
            navigator.clipboard.writeText(messageText).then(function() {
                const originalText = btn.innerText;
                btn.innerText = 'Copied!';
                btn.classList.add('copied');
                setTimeout(function() {
                    btn.innerText = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(function(err) {
                console.error('Failed to copy: ', err);
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = messageText;
                textArea.style.position = 'fixed';
                textArea.style.left = '-9999px';
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    btn.innerText = 'Copied!';
                    btn.classList.add('copied');
                    setTimeout(function() {
                        btn.innerText = 'Copy Message';
                        btn.classList.remove('copied');
                    }, 2000);
                } catch (err) {
                    console.error('Fallback copy failed: ', err);
                }
                document.body.removeChild(textArea);
            });
        }
    </script>
</body>
</html>
